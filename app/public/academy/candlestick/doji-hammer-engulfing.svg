<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Pola candlestick: Doji, Hammer, dan Bullish Engulfing">
  <!-- ============ DOJI ============ -->
  <g>
    <line x1="110" y1="60" x2="110" y2="240" stroke="#9ca3af" stroke-width="2" />
    <!-- tiny body: open approx close -->
    <rect x="84" y="146" width="52" height="8" fill="#9ca3af" />
    <text x="110" y="275" fill="#e5e7eb" font-size="15" font-weight="700" text-anchor="middle">Doji</text>
    <text x="110" y="296" fill="#999" font-size="12" text-anchor="middle">Open &#8776; Close &#8594; ragu</text>
  </g>

  <!-- ============ HAMMER ============ -->
  <g>
    <!-- short upper wick + long lower wick + small body at top -->
    <line x1="320" y1="80" x2="320" y2="240" stroke="#16a34a" stroke-width="2" />
    <rect x="294" y="80" width="52" height="40" fill="#16a34a" rx="2" />
    <text x="320" y="275" fill="#16a34a" font-size="15" font-weight="700" text-anchor="middle">Hammer</text>
    <text x="320" y="296" fill="#999" font-size="12" text-anchor="middle">Sumbu bawah panjang &#8594; potensi naik</text>
  </g>

  <!-- ============ BULLISH ENGULFING ============ -->
  <g>
    <!-- small red candle -->
    <line x1="520" y1="110" x2="520" y2="210" stroke="#dc2626" stroke-width="2" />
    <rect x="500" y="130" width="40" height="60" fill="#dc2626" rx="2" />
    <!-- big green candle that engulfs -->
    <line x1="600" y1="70" x2="600" y2="240" stroke="#16a34a" stroke-width="2" />
    <rect x="572" y="110" width="56" height="110" fill="#16a34a" rx="2" />
    <text x="565" y="275" fill="#16a34a" font-size="15" font-weight="700" text-anchor="middle">Bullish Engulfing</text>
    <text x="565" y="296" fill="#999" font-size="12" text-anchor="middle">Hijau "menelan" merah &#8594; sinyal naik</text>
  </g>
</svg>
