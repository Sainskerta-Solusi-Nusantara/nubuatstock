<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-label="Penerapan rasio Fibonacci pada Elliott Wave: retracement wave 2 di 0.618 dan target extension wave 3 di 1.618">
  <style>
    .impulse { stroke: #16a34a; stroke-width: 3; fill: none; stroke-linejoin: round; stroke-linecap: round; }
    .dot-i { fill: #16a34a; }
    .lbl { fill: #888; font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; }
    .cap { fill: #888; font-family: system-ui, -apple-system, sans-serif; font-size: 13px; }
    .fib { fill: #888; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; }
    .axis { stroke: #888; stroke-width: 1; opacity: 0.4; }
    .level { stroke: #888; stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.45; }
  </style>

  <line class="axis" x1="40" y1="20" x2="40" y2="330" />
  <line class="axis" x1="40" y1="330" x2="700" y2="330" />

  <!-- wave 1 up: 0(70,290) 1(220,130) ; wave 2 retrace to 0.618: 2(300,230); wave 3 to extension: 3(560,40) -->
  <polyline class="impulse" points="70,290 220,130 300,230 560,40" />
  <circle class="dot-i" cx="220" cy="130" r="5" />
  <circle class="dot-i" cx="300" cy="230" r="5" />
  <circle class="dot-i" cx="560" cy="40" r="5" />

  <text class="lbl" x="214" y="120">1</text>
  <text class="lbl" x="304" y="244">2</text>
  <text class="lbl" x="554" y="32">3</text>

  <!-- fib retracement levels for wave 1 (from 70,290 to 220,130 => range y130..290) -->
  <line class="level" x1="220" y1="130" x2="640" y2="130" />
  <text class="fib" x="645" y="134">0.0 (puncak 1)</text>
  <line class="level" x1="220" y1="191" x2="640" y2="191" />
  <text class="fib" x="645" y="195">0.382</text>
  <line class="level" x1="220" y1="210" x2="640" y2="210" />
  <text class="fib" x="645" y="214">0.5</text>
  <line class="level" x1="220" y1="229" x2="640" y2="229" />
  <text class="fib" x="645" y="233">0.618 (zona wave 2)</text>

  <!-- extension target -->
  <line class="level" x1="300" y1="40" x2="560" y2="40" />
  <text class="fib" x="380" y="34">target wave 3 ~ 1.618x wave 1</text>

  <text class="cap" x="40" y="356">Wave 2 sering pantul di 0.5-0.618; wave 3 sering meluas ke 1.618x panjang wave 1.</text>
</svg>
