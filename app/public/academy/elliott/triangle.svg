<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="Pola koreksi Triangle A-B-C-D-E dengan ayunan yang makin mengecil (konvergen)">
  <style>
    .corr { stroke: #dc2626; stroke-width: 3; fill: none; stroke-linejoin: round; stroke-linecap: round; }
    .dot-c { fill: #dc2626; }
    .lbl { fill: #888; font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; }
    .cap { fill: #888; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }
    .axis { stroke: #888; stroke-width: 1; opacity: 0.4; }
    .guide { stroke: #888; stroke-width: 1.5; stroke-dasharray: 5 4; opacity: 0.6; }
  </style>
  <line class="axis" x1="40" y1="20" x2="40" y2="270" />
  <line class="axis" x1="40" y1="270" x2="460" y2="270" />

  <!-- converging triangle: highs descending, lows ascending -->
  <!-- 0(70,150) A(140,230) B(200,80) C(270,210) D(330,110) E(400,170) -->
  <polyline class="corr" points="70,150 140,230 200,80 270,210 330,110 400,170" />
  <circle class="dot-c" cx="140" cy="230" r="5" />
  <circle class="dot-c" cx="200" cy="80" r="5" />
  <circle class="dot-c" cx="270" cy="210" r="5" />
  <circle class="dot-c" cx="330" cy="110" r="5" />
  <circle class="dot-c" cx="400" cy="170" r="5" />

  <!-- converging trendlines -->
  <line class="guide" x1="200" y1="80" x2="400" y2="150" />
  <line class="guide" x1="140" y1="230" x2="400" y2="190" />

  <text class="lbl" x="134" y="248">A</text>
  <text class="lbl" x="196" y="72">B</text>
  <text class="lbl" x="272" y="226">C</text>
  <text class="lbl" x="326" y="102">D</text>
  <text class="lbl" x="406" y="172">E</text>

  <text class="cap" x="240" y="300" text-anchor="middle">Triangle (A-B-C-D-E): ayunan mengecil, jeda sebelum lanjut</text>
</svg>
