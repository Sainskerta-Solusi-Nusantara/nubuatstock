<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Expectancy positif: win rate rendah tetap untung jika reward jauh lebih besar dari risk">
  <text x="360" y="32" fill="#e5e7eb" font-size="14" font-weight="700" text-anchor="middle">Kenapa Win Rate Bukan Segalanya</text>

  <!-- scenario A: high winrate small RR -->
  <text x="190" y="70" fill="#e5e7eb" font-size="12" font-weight="700" text-anchor="middle">Menang sering, untung kecil</text>
  <rect x="70" y="85" width="160" height="26" fill="#16a34a" opacity="0.3" /><text x="80" y="103" fill="#16a34a" font-size="11">6 menang &#215; +1</text>
  <rect x="70" y="118" width="160" height="26" fill="#dc2626" opacity="0.3" /><text x="80" y="136" fill="#dc2626" font-size="11">4 kalah &#215; &#8722;2</text>
  <text x="190" y="172" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">Net = +6 &#8722; 8 = &#8722;2 &#10007;</text>

  <!-- divider -->
  <line x1="360" y1="60" x2="360" y2="200" stroke="#374151" stroke-width="1" />

  <!-- scenario B: low winrate big RR -->
  <text x="530" y="70" fill="#e5e7eb" font-size="12" font-weight="700" text-anchor="middle">Menang jarang, untung besar</text>
  <rect x="450" y="85" width="160" height="26" fill="#16a34a" opacity="0.3" /><text x="460" y="103" fill="#16a34a" font-size="11">4 menang &#215; +3</text>
  <rect x="450" y="118" width="160" height="26" fill="#dc2626" opacity="0.3" /><text x="460" y="136" fill="#dc2626" font-size="11">6 kalah &#215; &#8722;1</text>
  <text x="530" y="172" fill="#16a34a" font-size="13" font-weight="700" text-anchor="middle">Net = +12 &#8722; 6 = +6 &#10003;</text>

  <text x="360" y="225" fill="#f59e0b" font-size="12.5" text-anchor="middle" font-weight="700">Expectancy = (WinRate &#215; AvgWin) &#8722; (LossRate &#215; AvgLoss)</text>
  <text x="360" y="265" fill="#999" font-size="11.5" text-anchor="middle">Win rate 40% bisa CUAN kalau R:R bagus. Jaga reward &gt; risk (min 1:2), bukan sekadar sering menang.</text>
</svg>
