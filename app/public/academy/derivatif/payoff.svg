<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="sans-serif">
  <rect x="0" y="0" width="800" height="360" fill="#ffffff"/>

  <!-- ================= LONG CALL (kiri) ================= -->
  <g>
    <text x="200" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f2937">Long Call</text>

    <!-- Axes -->
    <!-- y-axis -->
    <line x1="80" y1="60" x2="80" y2="300" stroke="#1f2937" stroke-width="2"/>
    <!-- x-axis -->
    <line x1="60" y1="300" x2="360" y2="300" stroke="#1f2937" stroke-width="2"/>
    <!-- zero (profit/rugi = 0) line -->
    <line x1="80" y1="200" x2="360" y2="200" stroke="#1f2937" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="84" y="195" font-size="11" fill="#1f2937">Profit 0</text>

    <!-- Strike marker -->
    <line x1="200" y1="200" x2="200" y2="304" stroke="#1f2937" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="200" y="320" text-anchor="middle" font-size="11" fill="#1f2937">Strike</text>

    <!-- Payoff line: flat negative (loss = premium) then upward slope -->
    <polyline points="90,260 200,260 340,90" fill="none" stroke="#22c55e" stroke-width="3"/>

    <!-- Premium / max loss note -->
    <line x1="90" y1="260" x2="200" y2="260" stroke="#ef4444" stroke-width="3"/>
    <text x="96" y="280" font-size="11" fill="#ef4444">Premium (rugi maks.)</text>

    <!-- Axis labels -->
    <text x="210" y="345" text-anchor="middle" font-size="12" fill="#1f2937">Harga Underlying</text>
    <text x="46" y="180" text-anchor="middle" font-size="12" fill="#1f2937" transform="rotate(-90 46 180)">Profit / Rugi</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="310" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ================= LONG PUT (kanan) ================= -->
  <g>
    <text x="600" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1f2937">Long Put</text>

    <!-- Axes -->
    <line x1="480" y1="60" x2="480" y2="300" stroke="#1f2937" stroke-width="2"/>
    <line x1="460" y1="300" x2="760" y2="300" stroke="#1f2937" stroke-width="2"/>
    <!-- zero line -->
    <line x1="480" y1="200" x2="760" y2="200" stroke="#1f2937" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="484" y="195" font-size="11" fill="#1f2937">Profit 0</text>

    <!-- Strike marker -->
    <line x1="640" y1="200" x2="640" y2="304" stroke="#1f2937" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="640" y="320" text-anchor="middle" font-size="11" fill="#1f2937">Strike</text>

    <!-- Payoff line: downward slope then flat negative (loss = premium) -->
    <polyline points="500,90 640,260 750,260" fill="none" stroke="#22c55e" stroke-width="3"/>

    <!-- Premium / max loss note -->
    <line x1="640" y1="260" x2="750" y2="260" stroke="#ef4444" stroke-width="3"/>
    <text x="648" y="280" font-size="11" fill="#ef4444">Premium (rugi maks.)</text>

    <!-- Axis labels -->
    <text x="610" y="345" text-anchor="middle" font-size="12" fill="#1f2937">Harga Underlying</text>
    <text x="446" y="180" text-anchor="middle" font-size="12" fill="#1f2937" transform="rotate(-90 446 180)">Profit / Rugi</text>
  </g>
</svg>
