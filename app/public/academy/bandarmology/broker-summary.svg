<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Ilustrasi tabel broker summary: top buyers net beli dan top sellers net jual">
  <!-- ===== TOP BUYERS ===== -->
  <text x="40" y="40" fill="#16a34a" font-size="15" font-weight="700">Top Buyers (Net Beli)</text>
  <g font-size="13">
    <!-- header -->
    <rect x="40" y="55" width="300" height="30" fill="#16a34a" opacity="0.15" />
    <text x="52" y="75" fill="#999">Broker</text>
    <text x="180" y="75" fill="#999">Lot</text>
    <text x="252" y="75" fill="#999">Avg Price</text>
    <!-- rows -->
    <g fill="#e5e7eb">
      <text x="52" y="108">YP</text><text x="180" y="108">+12.500</text><text x="252" y="108">1.180</text>
      <text x="52" y="138">CC</text><text x="180" y="138">+8.200</text><text x="252" y="138">1.175</text>
      <text x="52" y="168">AK</text><text x="180" y="168">+5.100</text><text x="252" y="168">1.182</text>
    </g>
    <line x1="40" y1="118" x2="340" y2="118" stroke="#374151" stroke-width="1" />
    <line x1="40" y1="148" x2="340" y2="148" stroke="#374151" stroke-width="1" />
  </g>

  <!-- ===== TOP SELLERS ===== -->
  <text x="390" y="40" fill="#dc2626" font-size="15" font-weight="700">Top Sellers (Net Jual)</text>
  <g font-size="13">
    <rect x="390" y="55" width="300" height="30" fill="#dc2626" opacity="0.15" />
    <text x="402" y="75" fill="#999">Broker</text>
    <text x="530" y="75" fill="#999">Lot</text>
    <text x="602" y="75" fill="#999">Avg Price</text>
    <g fill="#e5e7eb">
      <text x="402" y="108">PD</text><text x="530" y="108">&#8722;9.800</text><text x="602" y="108">1.160</text>
      <text x="402" y="138">NI</text><text x="530" y="138">&#8722;6.400</text><text x="602" y="138">1.165</text>
      <text x="402" y="168">DR</text><text x="530" y="168">&#8722;4.300</text><text x="602" y="168">1.158</text>
    </g>
    <line x1="390" y1="118" x2="690" y2="118" stroke="#374151" stroke-width="1" />
    <line x1="390" y1="148" x2="690" y2="148" stroke="#374151" stroke-width="1" />
  </g>

  <!-- net bar -->
  <line x1="40" y1="215" x2="690" y2="215" stroke="#4b5563" stroke-width="1" />
  <text x="40" y="245" fill="#e5e7eb" font-size="13" font-weight="700">Net Value (Beli &#8722; Jual)</text>
  <!-- center axis -->
  <line x1="365" y1="260" x2="365" y2="330" stroke="#6b7280" stroke-width="1" />
  <rect x="365" y="270" width="180" height="18" fill="#16a34a" />
  <text x="555" y="284" fill="#16a34a" font-size="12">net beli broker besar</text>
  <rect x="245" y="300" width="120" height="18" fill="#dc2626" />
  <text x="235" y="314" fill="#dc2626" font-size="12" text-anchor="end">net jual</text>
  <text x="40" y="350" fill="#999" font-size="11">Net beli asing/institusi konsisten beberapa hari &#8594; indikasi akumulasi serius</text>
</svg>
