<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="system-ui, sans-serif">
  <!-- Margin of safety: selisih nilai wajar vs harga pasar -->
  <text x="400" y="32" text-anchor="middle" fill="#999" font-size="20" font-weight="700">Margin of Safety</text>

  <defs>
    <marker id="a3" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M4.5,0 L9,4.5 L4.5,9 L0,4.5 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- batang nilai wajar -->
  <rect x="160" y="80" width="120" height="200" rx="6" fill="#16a34a" fill-opacity="0.18" stroke="#16a34a" stroke-width="2"/>
  <text x="220" y="68" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="700">Nilai Wajar</text>
  <text x="220" y="190" text-anchor="middle" fill="#16a34a" font-size="13">estimasi</text>
  <text x="220" y="208" text-anchor="middle" fill="#16a34a" font-size="13">intrinsik</text>

  <!-- batang harga pasar (lebih rendah) -->
  <rect x="520" y="180" width="120" height="100" rx="6" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-width="2"/>
  <text x="580" y="168" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="700">Harga Pasar</text>
  <text x="580" y="238" text-anchor="middle" fill="#3b82f6" font-size="13">harga beli</text>

  <!-- zona margin of safety -->
  <line x1="220" y1="80" x2="580" y2="80" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="220" y1="180" x2="580" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="430" y="80" width="40" height="100" fill="#16a34a" fill-opacity="0.12"/>
  <line x1="450" y1="84" x2="450" y2="176" stroke="#16a34a" stroke-width="1.5" marker-start="url(#a3)" marker-end="url(#a3)"/>
  <text x="450" y="130" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="700" transform="rotate(-90 450 130)">Margin of Safety</text>

  <text x="400" y="320" text-anchor="middle" fill="#999" font-size="13">MoS = (Nilai Wajar - Harga) / Nilai Wajar. Bantalan untuk salah estimasi dan risiko tak terduga.</text>
</svg>
