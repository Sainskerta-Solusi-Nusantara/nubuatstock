<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Divergensi bearish: harga buat higher high tapi indikator money flow buat lower high">
  <!-- PRICE panel -->
  <text x="40" y="30" fill="#e5e7eb" font-size="13" font-weight="700">Harga</text>
  <polyline points="40,140 110,90 180,130 260,60 340,110 420,40 500,100"
    fill="none" stroke="#e5e7eb" stroke-width="2.5" stroke-linejoin="round" />
  <!-- higher highs on price -->
  <circle cx="260" cy="60" r="5" fill="#16a34a" /><circle cx="420" cy="40" r="5" fill="#16a34a" />
  <line x1="260" y1="60" x2="420" y2="40" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" />
  <text x="300" y="32" fill="#16a34a" font-size="11" font-weight="700">Higher High (harga naik)</text>

  <!-- divider -->
  <line x1="40" y1="200" x2="680" y2="200" stroke="#374151" stroke-width="1" />

  <!-- MONEY FLOW panel -->
  <text x="40" y="232" fill="#3b82f6" font-size="13" font-weight="700">Money Flow (OBV / MFI)</text>
  <polyline points="40,300 110,260 180,295 260,250 340,290 420,290 500,320"
    fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" />
  <!-- lower highs on indicator -->
  <circle cx="260" cy="250" r="5" fill="#dc2626" /><circle cx="420" cy="290" r="5" fill="#dc2626" />
  <line x1="260" y1="250" x2="420" y2="290" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" />
  <text x="300" y="345" fill="#dc2626" font-size="11" font-weight="700">Lower High (aliran dana melemah)</text>

  <text x="40" y="372" fill="#999" font-size="11.5">Divergensi bearish: harga naik tak didukung aliran dana → sinyal dini potensi pembalikan turun.</text>
</svg>
