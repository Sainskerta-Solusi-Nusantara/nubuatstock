<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Alur dampak masuknya saham ke indeks MSCI: pengumuman, dana pasif membeli, arus dana asing masuk, harga naik">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Dampak Saham Masuk Indeks MSCI</text>

  <!-- flow chain -->
  <g>
    <rect x="28" y="70" width="150" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="103" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">1. Pengumuman</text>
    <text x="103" y="120" text-anchor="middle" font-size="11" fill="#1e40af">Review kuartalan</text>
    <text x="103" y="134" text-anchor="middle" font-size="11" fill="#1e40af">(Feb/Mei/Agu/Nov)</text>

    <rect x="200" y="70" width="150" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="275" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">2. Dana pasif</text>
    <text x="275" y="120" text-anchor="middle" font-size="11" fill="#1e40af">ETF wajib beli</text>
    <text x="275" y="134" text-anchor="middle" font-size="11" fill="#1e40af">sesuai bobot baru</text>

    <rect x="372" y="70" width="150" height="70" rx="10" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="447" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">3. Arus asing</text>
    <text x="447" y="120" text-anchor="middle" font-size="11" fill="#1e40af">Foreign inflow</text>
    <text x="447" y="134" text-anchor="middle" font-size="11" fill="#1e40af">masuk ke saham</text>

    <rect x="544" y="70" width="150" height="70" rx="10" fill="#dcfce7" stroke="#86efac"/>
    <text x="619" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">4. Harga naik</text>
    <text x="619" y="120" text-anchor="middle" font-size="11" fill="#166534">Permintaan &gt;</text>
    <text x="619" y="134" text-anchor="middle" font-size="11" fill="#166534">penawaran</text>
  </g>
  <g stroke="#3b82f6" stroke-width="2.5" marker-end="url(#a2)">
    <line x1="178" y1="105" x2="198" y2="105"/>
    <line x1="350" y1="105" x2="370" y2="105"/>
    <line x1="522" y1="105" x2="542" y2="105"/>
  </g>
  <defs><marker id="a2" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#3b82f6"/></marker></defs>

  <!-- mini price chart -->
  <text x="40" y="186" font-size="13" font-weight="700" fill="#0f172a">Pola harga di sekitar tanggal efektif (ilustrasi)</text>
  <rect x="40" y="198" width="640" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <line x1="360" y1="206" x2="360" y2="310" stroke="#cbd5e1" stroke-dasharray="4 4"/>
  <text x="360" y="206" text-anchor="middle" font-size="10" fill="#64748b">tanggal efektif</text>
  <polyline points="60,290 130,284 200,278 270,268 330,250 360,238 410,236 470,242 540,250 620,256" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <text x="150" y="270" font-size="11" fill="#1e40af">naik jelang inclusion</text>
  <text x="470" y="280" font-size="11" fill="#64748b">sering profit-taking sesudahnya</text>

  <text x="40" y="340" font-size="11" fill="#64748b">Kriteria utama MSCI: ukuran (market cap), likuiditas, dan <tspan font-weight="700" fill="#0f172a">free float</tspan> memadai. Exclusion = arus sebaliknya.</text>
</svg>
