<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Free float adjusted: hanya porsi saham publik yang dihitung untuk bobot indeks, bukan saham pengendali">
  <rect x="0" y="0" width="720" height="360" fill="#ffffff"/>
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Free Float: Saham yang Benar-benar Beredar di Publik</text>

  <!-- total shares bar -->
  <text x="48" y="86" font-size="13" font-weight="700" fill="#0f172a">Total saham tercatat (100%)</text>
  <rect x="48" y="96" width="624" height="48" rx="6" fill="#e2e8f0"/>
  <rect x="48" y="96" width="405" height="48" rx="6" fill="#94a3b8"/>
  <text x="250" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Pengendali / strategis 65%</text>
  <text x="565" y="125" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Publik 35%</text>

  <!-- arrow -->
  <line x1="453" y1="150" x2="453" y2="186" stroke="#0ea5e9" stroke-width="2" marker-end="url(#a3)"/>
  <defs><marker id="a3" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#0ea5e9"/></marker></defs>

  <!-- free float adjusted -->
  <text x="48" y="208" font-size="13" font-weight="700" fill="#0369a1">Yang dihitung indeks = Free Float (35%)</text>
  <rect x="453" y="218" width="219" height="48" rx="6" fill="#0ea5e9"/>
  <text x="562" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Free-float adjusted</text>
  <rect x="48" y="218" width="405" height="48" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-dasharray="5 4"/>
  <text x="250" y="247" text-anchor="middle" font-size="12" fill="#94a3b8">tidak dihitung (terkunci)</text>

  <rect x="48" y="286" width="624" height="56" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="64" y="310" font-size="12" fill="#155e75">MSCI/FTSE &amp; IDX (sejak 2021) memakai <tspan font-weight="700">free-float adjusted market cap</tspan> — makin besar free float &amp; likuiditas,</text>
  <text x="64" y="330" font-size="12" fill="#155e75">makin besar bobotnya di indeks. Di Nubuat, lihat angka ini di fitur <tspan font-weight="700">Kepemilikan Saham</tspan>.</text>
</svg>
