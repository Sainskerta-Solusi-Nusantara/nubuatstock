<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Timeline dividen: cum-date, ex-date, recording date, payment date">
  <!-- timeline base -->
  <line x1="60" y1="120" x2="680" y2="120" stroke="#4b5563" stroke-width="2" />
  <!-- nodes -->
  <g>
    <circle cx="120" cy="120" r="8" fill="#16a34a" /><text x="120" y="95" fill="#16a34a" font-size="12" font-weight="700" text-anchor="middle">Cum-Date</text>
    <text x="120" y="150" fill="#999" font-size="10" text-anchor="middle">hari terakhir</text><text x="120" y="164" fill="#999" font-size="10" text-anchor="middle">masih dapat</text>
    <circle cx="300" cy="120" r="8" fill="#dc2626" /><text x="300" y="95" fill="#dc2626" font-size="12" font-weight="700" text-anchor="middle">Ex-Date</text>
    <text x="300" y="150" fill="#999" font-size="10" text-anchor="middle">beli hari ini</text><text x="300" y="164" fill="#999" font-size="10" text-anchor="middle">TIDAK dapat</text>
    <circle cx="480" cy="120" r="8" fill="#9ca3af" /><text x="480" y="95" fill="#e5e7eb" font-size="12" font-weight="700" text-anchor="middle">Recording</text>
    <text x="480" y="150" fill="#999" font-size="10" text-anchor="middle">pencatatan</text><text x="480" y="164" fill="#999" font-size="10" text-anchor="middle">pemegang</text>
    <circle cx="640" cy="120" r="8" fill="#3b82f6" /><text x="640" y="95" fill="#3b82f6" font-size="12" font-weight="700" text-anchor="middle">Payment</text>
    <text x="640" y="150" fill="#999" font-size="10" text-anchor="middle">dividen</text><text x="640" y="164" fill="#999" font-size="10" text-anchor="middle">masuk RDN</text>
  </g>
  <!-- ex-date price drop note -->
  <text x="300" y="210" fill="#dc2626" font-size="11" text-anchor="middle" font-weight="700">harga turun &#177;sebesar dividen (wajar)</text>
  <text x="360" y="250" fill="#999" font-size="11.5" text-anchor="middle">Untuk dapat dividen: pegang saham SAMPAI cum-date (beli paling lambat di cum-date).</text>
</svg>
