<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Empat kuadran RRG: Improving kiri atas, Leading kanan atas, Lagging kiri bawah, Weakening kanan bawah, dengan rotasi searah jarum jam">
  <!-- quadrant fills -->
  <rect x="60" y="40" width="180" height="180" fill="#3b82f6" opacity="0.08" />
  <rect x="240" y="40" width="180" height="180" fill="#16a34a" opacity="0.08" />
  <rect x="60" y="220" width="180" height="180" fill="#dc2626" opacity="0.08" />
  <rect x="240" y="220" width="180" height="180" fill="#f59e0b" opacity="0.08" />
  <!-- axes -->
  <line x1="240" y1="40" x2="240" y2="400" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3" />
  <line x1="60" y1="220" x2="420" y2="220" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3" />
  <!-- quadrant labels -->
  <text x="70" y="60" fill="#3b82f6" font-size="13" font-weight="700">IMPROVING</text>
  <text x="330" y="60" fill="#16a34a" font-size="13" font-weight="700">LEADING</text>
  <text x="70" y="392" fill="#dc2626" font-size="13" font-weight="700">LAGGING</text>
  <text x="318" y="392" fill="#f59e0b" font-size="13" font-weight="700">WEAKENING</text>
  <!-- axis titles -->
  <text x="240" y="425" fill="#999" font-size="11" text-anchor="middle">RS-Ratio (kekuatan relatif) &#8594;</text>
  <text x="30" y="220" fill="#999" font-size="11" text-anchor="middle" transform="rotate(-90 30 220)">RS-Momentum &#8594;</text>
  <!-- clockwise rotation arrows -->
  <path d="M150 130 q90 -55 180 0" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ar)" />
  <path d="M330 300 q-90 55 -180 0" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#ar)" />
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0 0 L9 4 L0 8 z" fill="#6b7280"/></marker></defs>
  <text x="160" y="245" fill="#6b7280" font-size="11" font-weight="700">Rotasi searah jarum jam</text>
  <!-- sample dot in improving heading to leading -->
  <circle cx="200" cy="120" r="6" fill="#3b82f6" />
  <text x="120" y="445" fill="#999" font-size="10.5">Cari sektor di Improving menuju Leading (momentum baru tumbuh).</text>
</svg>
