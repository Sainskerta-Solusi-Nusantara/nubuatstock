<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Level support dan resistance dengan garis tren naik dan turun">
  <!-- ===== LEFT: Support & Resistance horizontal ===== -->
  <g>
    <!-- resistance line -->
    <line x1="40" y1="70" x2="340" y2="70" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" />
    <text x="40" y="60" fill="#dc2626" font-size="13" font-weight="700">Resistance (atap)</text>
    <!-- support line -->
    <line x1="40" y1="280" x2="340" y2="280" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4" />
    <text x="40" y="300" fill="#16a34a" font-size="13" font-weight="700">Support (lantai)</text>

    <!-- price zigzag bouncing between S/R -->
    <polyline points="50,250 90,90 130,270 175,80 215,275 260,75 300,260 335,150"
      fill="none" stroke="#e5e7eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />
    <!-- bounce dots -->
    <g fill="#9ca3af">
      <circle cx="90" cy="90" r="3" />
      <circle cx="130" cy="270" r="3" />
      <circle cx="175" cy="80" r="3" />
      <circle cx="215" cy="275" r="3" />
      <circle cx="260" cy="75" r="3" />
      <circle cx="300" cy="260" r="3" />
    </g>
  </g>

  <!-- ===== RIGHT: Trend lines ===== -->
  <g>
    <!-- uptrend channel: rising support -->
    <polyline points="400,290 440,230 425,255 480,180 460,210 530,130 510,165 580,90"
      fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />
    <line x1="400" y1="300" x2="600" y2="100" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5 3" />
    <text x="400" y="50" fill="#16a34a" font-size="13" font-weight="700">Tren naik</text>
    <text x="400" y="68" fill="#999" font-size="11">higher high &amp; higher low</text>

    <!-- downtrend small inset -->
    <polyline points="610,120 645,165 632,140 668,200 655,175 695,235"
      fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />
    <line x1="608" y1="110" x2="700" y2="200" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3" />
    <text x="612" y="270" fill="#dc2626" font-size="12" font-weight="700">Tren turun</text>
  </g>
</svg>
