<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="ETF dan reksa dana: satu produk berisi banyak saham, diversifikasi instan">
  <text x="360" y="32" fill="#e5e7eb" font-size="14" font-weight="700" text-anchor="middle">Diversifikasi Instan: 1 Produk = Banyak Saham</text>

  <!-- single product box -->
  <rect x="70" y="110" width="150" height="80" rx="10" fill="#3b82f6" opacity="0.18" stroke="#3b82f6" stroke-width="2" />
  <text x="145" y="145" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">1 ETF /</text>
  <text x="145" y="165" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">Reksa Dana</text>

  <!-- arrow -->
  <text x="245" y="160" fill="#6b7280" font-size="26">&#8594;</text>

  <!-- basket of stocks -->
  <g font-size="11" font-weight="700" text-anchor="middle">
    <circle cx="340" cy="100" r="22" fill="#16a34a" opacity="0.18" stroke="#16a34a" stroke-width="1.5" /><text x="340" y="104" fill="#16a34a">BBCA</text>
    <circle cx="400" cy="150" r="22" fill="#16a34a" opacity="0.18" stroke="#16a34a" stroke-width="1.5" /><text x="400" y="154" fill="#16a34a">BBRI</text>
    <circle cx="340" cy="200" r="22" fill="#16a34a" opacity="0.18" stroke="#16a34a" stroke-width="1.5" /><text x="340" y="204" fill="#16a34a">TLKM</text>
    <circle cx="465" cy="105" r="22" fill="#16a34a" opacity="0.18" stroke="#16a34a" stroke-width="1.5" /><text x="465" y="109" fill="#16a34a">ASII</text>
    <circle cx="525" cy="155" r="22" fill="#16a34a" opacity="0.18" stroke="#16a34a" stroke-width="1.5" /><text x="525" y="159" fill="#16a34a">UNVR</text>
    <circle cx="465" cy="205" r="22" fill="#16a34a" opacity="0.18" stroke="#16a34a" stroke-width="1.5" /><text x="465" y="209" fill="#16a34a">+40</text>
  </g>
  <text x="600" y="150" fill="#9ca3af" font-size="12" text-anchor="middle">...puluhan</text>
  <text x="600" y="168" fill="#9ca3af" font-size="12" text-anchor="middle">emiten</text>

  <text x="360" y="278" fill="#999" font-size="11.5" text-anchor="middle">Satu transaksi → eksposur ke banyak saham. Cocok kalau belum pede pilih emiten satuan.</text>
</svg>
