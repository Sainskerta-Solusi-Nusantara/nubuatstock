<svg viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="620" height="320" fill="none"/>
  <line x1="40" y1="20" x2="40" y2="280" stroke="#888" stroke-width="1"/>
  <line x1="40" y1="280" x2="600" y2="280" stroke="#888" stroke-width="1"/>
  <text x="320" y="18" fill="#999" font-size="14" font-weight="bold" text-anchor="middle">CUP &amp; HANDLE (bullish continuation)</text>
  <!-- cup: U shape -->
  <path d="M 70 90 C 110 250, 330 250, 380 90" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <!-- rim line (resistance) -->
  <line x1="70" y1="90" x2="470" y2="90" stroke="#999" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="150" y="80" fill="#999" font-size="13">Rim / resistance (level breakout)</text>
  <text x="200" y="240" fill="#999" font-size="13">Cup (dasar membulat "U")</text>
  <!-- handle: small downward drift -->
  <polyline points="380,90 405,130 430,115 455,140 470,118" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="395" y="165" fill="#999" font-size="12">Handle (pullback kecil)</text>
  <!-- breakout -->
  <polyline points="470,118 500,70 545,45" fill="none" stroke="#16a34a" stroke-width="3"/>
  <circle cx="470" cy="90" r="5" fill="#16a34a"/>
  <text x="500" y="60" fill="#16a34a" font-size="13" font-weight="bold">Breakout ▲</text>
  <!-- target = cup depth projected -->
  <line x1="545" y1="90" x2="545" y2="45" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="552" y="70" fill="#16a34a" font-size="11">target ≈ kedalaman cup</text>
  <text x="44" y="35" fill="#999" font-size="12">Harga</text>
</svg>
