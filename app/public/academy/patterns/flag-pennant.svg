<svg viewBox="0 0 640 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="640" height="300" fill="none"/>
  <text x="320" y="18" fill="#999" font-size="14" font-weight="bold" text-anchor="middle">FLAG &amp; PENNANT (continuation — jeda lalu lanjut)</text>

  <!-- FLAG -->
  <text x="160" y="48" fill="#999" font-size="13" text-anchor="middle" font-weight="bold">Bull Flag</text>
  <!-- flagpole sharp rally -->
  <polyline points="40,240 110,80" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="30" y="170" fill="#999" font-size="11" transform="rotate(-60 60 170)">tiang (pole)</text>
  <!-- flag channel sloping down -->
  <polyline points="110,80 145,120 175,95 205,135" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <line x1="108" y1="78" x2="208" y2="118" stroke="#999" stroke-width="1.3" stroke-dasharray="5 3"/>
  <line x1="125" y1="118" x2="225" y2="158" stroke="#999" stroke-width="1.3" stroke-dasharray="5 3"/>
  <!-- breakout continuation -->
  <polyline points="205,135 230,70 270,40" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="225" y="60" fill="#16a34a" font-size="12" font-weight="bold">breakout ▲</text>
  <text x="60" y="265" fill="#999" font-size="11">kanal kecil miring melawan tren, lalu lanjut naik</text>

  <!-- PENNANT -->
  <text x="470" y="48" fill="#999" font-size="13" text-anchor="middle" font-weight="bold">Bull Pennant</text>
  <polyline points="360,240 430,90" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <!-- small symmetrical triangle -->
  <line x1="430" y1="90" x2="520" y2="120" stroke="#999" stroke-width="1.3" stroke-dasharray="5 3"/>
  <line x1="430" y1="150" x2="520" y2="120" stroke="#999" stroke-width="1.3" stroke-dasharray="5 3"/>
  <polyline points="430,90 455,148 475,108 500,135 520,120" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- breakout -->
  <polyline points="520,120 545,70 585,42" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="540" y="62" fill="#16a34a" font-size="12" font-weight="bold">breakout ▲</text>
  <text x="380" y="265" fill="#999" font-size="11">segitiga mungil menyempit, lalu lanjut naik</text>
</svg>
