<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <rect width="640" height="280" fill="none"/>
  <text x="320" y="18" fill="#999" font-size="14" font-weight="bold" text-anchor="middle">REVERSAL vs CONTINUATION</text>

  <!-- Reversal -->
  <text x="160" y="48" fill="#999" font-size="13" text-anchor="middle" font-weight="bold">Pola Pembalikan (Reversal)</text>
  <line x1="30" y1="70" x2="30" y2="250" stroke="#888" stroke-width="1"/>
  <line x1="30" y1="250" x2="300" y2="250" stroke="#888" stroke-width="1"/>
  <!-- up trend then reversal down -->
  <polyline points="40,230 110,120 150,150 190,110 230,180 290,230"
            fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="55" y="200" fill="#16a34a" font-size="11">tren naik</text>
  <text x="225" y="210" fill="#dc2626" font-size="11">↓ tren balik</text>
  <text x="60" y="270" fill="#999" font-size="11">arah tren BERUBAH setelah pola</text>

  <!-- Continuation -->
  <text x="490" y="48" fill="#999" font-size="13" text-anchor="middle" font-weight="bold">Pola Penerusan (Continuation)</text>
  <line x1="360" y1="70" x2="360" y2="250" stroke="#888" stroke-width="1"/>
  <line x1="360" y1="250" x2="630" y2="250" stroke="#888" stroke-width="1"/>
  <!-- up trend, pause, continue up -->
  <polyline points="370,230 440,130 470,160 500,135 530,165 560,90 620,60"
            fill="none" stroke="#3b82f6" stroke-width="3"/>
  <rect x="455" y="125" width="80" height="55" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="468" y="200" fill="#999" font-size="11">jeda</text>
  <text x="565" y="80" fill="#16a34a" font-size="11">lanjut ↑</text>
  <text x="390" y="270" fill="#999" font-size="11">arah tren LANJUT setelah jeda</text>
</svg>
