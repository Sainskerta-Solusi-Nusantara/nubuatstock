<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Payoff call warrant dengan exercise price dan break-even, serta ilustrasi time decay">
  <!-- axes -->
  <line x1="80" y1="260" x2="680" y2="260" stroke="#4b5563" stroke-width="1.5" />
  <line x1="80" y1="40" x2="80" y2="260" stroke="#4b5563" stroke-width="1.5" />
  <text x="690" y="264" fill="#999" font-size="11">Harga saham</text>
  <text x="20" y="44" fill="#999" font-size="11">Untung/Rugi</text>

  <!-- zero line already x-axis at y=260 -->
  <!-- exercise price marker -->
  <line x1="280" y1="40" x2="280" y2="270" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3" />
  <text x="250" y="290" fill="#9ca3af" font-size="11">Exercise</text>
  <!-- break-even marker -->
  <line x1="400" y1="40" x2="400" y2="270" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" />
  <text x="372" y="306" fill="#3b82f6" font-size="11" font-weight="700">Break-even</text>

  <!-- payoff line: flat loss (premium) until exercise, then rising, crossing zero at break-even -->
  <polyline points="80,300 280,300 400,260 660,120" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linejoin="round" />
  <text x="120" y="320" fill="#dc2626" font-size="11">rugi = harga beli waran (bisa jadi NOL)</text>
  <text x="470" y="150" fill="#16a34a" font-size="11" font-weight="700">untung (leverage)</text>

  <!-- time decay arrow -->
  <text x="430" y="60" fill="#f59e0b" font-size="12" font-weight="700">Time decay &#8595;</text>
  <text x="430" y="78" fill="#999" font-size="10.5">nilai menyusut mendekati jatuh tempo</text>
  <path d="M520 65 q40 30 70 70" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a)" />
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#f59e0b"/></marker></defs>

  <text x="80" y="332" fill="#999" font-size="11">Saham harus naik MELEWATI break-even sebelum jatuh tempo agar untung — bukan sekadar di atas exercise.</text>
</svg>
