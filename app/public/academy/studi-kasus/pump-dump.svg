<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Anatomi pump and dump: akumulasi, pom-pom, markup ARA, distribusi, markdown ARB">
  <!-- price curve: low accumulation -> sharp up (markup) -> sharp down (markdown) -->
  <polyline points="40,250 110,248 180,245 250,210 320,150 380,90 430,70 470,120 540,200 610,255 670,265"
    fill="none" stroke="#e5e7eb" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />

  <!-- accumulation -->
  <text x="60" y="280" fill="#16a34a" font-size="11" font-weight="700">Akumulasi</text>
  <text x="55" y="296" fill="#999" font-size="10">diam-diam, murah</text>

  <!-- markup ARA -->
  <text x="300" y="60" fill="#3b82f6" font-size="11" font-weight="700">Markup (ARA beruntun)</text>
  <text x="300" y="76" fill="#999" font-size="10">pom-pom &amp; hype</text>

  <!-- distribution -->
  <circle cx="430" cy="70" r="7" fill="none" stroke="#dc2626" stroke-width="2.5" />
  <text x="445" y="62" fill="#dc2626" font-size="11" font-weight="700">Distribusi: bandar jual</text>
  <text x="445" y="78" fill="#dc2626" font-size="10">ritel FOMO masuk di puncak</text>

  <!-- markdown ARB -->
  <text x="540" y="290" fill="#f59e0b" font-size="11" font-weight="700">Markdown (ARB beruntun)</text>
  <text x="560" y="306" fill="#999" font-size="10">ritel nyangkut</text>

  <text x="40" y="35" fill="#e5e7eb" font-size="13" font-weight="700">Anatomi "Gorengan" / Pump &amp; Dump</text>
</svg>
