<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Tahap eskalasi: aktivitas tak wajar, UMA, suspensi, sampai delisting">
  <text x="360" y="32" fill="#e5e7eb" font-size="14" font-weight="700" text-anchor="middle">Eskalasi Lampu Bahaya</text>
  <line x1="70" y1="120" x2="680" y2="120" stroke="#4b5563" stroke-width="2" />

  <circle cx="120" cy="120" r="9" fill="#f59e0b" /><text x="120" y="95" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">UMA</text>
  <text x="120" y="150" fill="#999" font-size="10" text-anchor="middle">aktivitas</text><text x="120" y="164" fill="#999" font-size="10" text-anchor="middle">tak wajar</text>

  <circle cx="310" cy="120" r="9" fill="#f97316" /><text x="310" y="95" fill="#f97316" font-size="12" font-weight="700" text-anchor="middle">Suspensi</text>
  <text x="310" y="150" fill="#999" font-size="10" text-anchor="middle">dibekukan,</text><text x="310" y="164" fill="#999" font-size="10" text-anchor="middle">tak bisa jual</text>

  <circle cx="500" cy="120" r="9" fill="#dc2626" /><text x="500" y="95" fill="#dc2626" font-size="12" font-weight="700" text-anchor="middle">Papan Khusus</text>
  <text x="500" y="150" fill="#999" font-size="10" text-anchor="middle">FCA, notasi,</text><text x="500" y="164" fill="#999" font-size="10" text-anchor="middle">likuiditas tipis</text>

  <circle cx="650" cy="120" r="9" fill="#991b1b" /><text x="650" y="95" fill="#dc2626" font-size="12" font-weight="700" text-anchor="middle">Delisting</text>
  <text x="650" y="150" fill="#999" font-size="10" text-anchor="middle">keluar bursa,</text><text x="650" y="164" fill="#999" font-size="10" text-anchor="middle">nilai &#8776; nol</text>

  <text x="360" y="225" fill="#999" font-size="11.5" text-anchor="middle">Tanda biasanya muncul lebih dulu di laporan keuangan &amp; notasi bursa — tugasmu membacanya.</text>
  <text x="360" y="252" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="700">Diversifikasi melindungi dari satu kesalahan fatal.</text>
</svg>
