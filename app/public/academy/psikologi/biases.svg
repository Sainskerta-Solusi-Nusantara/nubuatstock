<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="system-ui, sans-serif">
  <text x="60" y="34" fill="#999" font-size="14" font-weight="bold">6 Bias Kognitif yang Menguras Cuan</text>

  <!-- center brain node -->
  <circle cx="380" cy="220" r="46" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="350" y="218" fill="#3b82f6" font-size="13" font-weight="bold">OTAK</text>
  <text x="345" y="236" fill="#999" font-size="11">trader</text>

  <!-- 6 bias bubbles -->
  <g>
    <line x1="380" y1="174" x2="380" y2="100" stroke="#999" stroke-width="1"/>
    <ellipse cx="380" cy="80" rx="70" ry="26" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="355" y="78" fill="#dc2626" font-size="12" font-weight="bold">FOMO</text>
    <text x="338" y="94" fill="#999" font-size="10">kejar harga naik</text>
  </g>
  <g>
    <line x1="424" y1="200" x2="600" y2="120" stroke="#999" stroke-width="1"/>
    <ellipse cx="650" cy="105" rx="78" ry="26" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="600" y="103" fill="#dc2626" font-size="12" font-weight="bold">Loss aversion</text>
    <text x="600" y="119" fill="#999" font-size="10">hold saham rugi</text>
  </g>
  <g>
    <line x1="426" y1="232" x2="600" y2="270" stroke="#999" stroke-width="1"/>
    <ellipse cx="660" cy="285" rx="78" ry="26" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="608" y="283" fill="#dc2626" font-size="12" font-weight="bold">Confirmation</text>
    <text x="608" y="299" fill="#999" font-size="10">cari yg setuju saja</text>
  </g>
  <g>
    <line x1="400" y1="262" x2="430" y2="360" stroke="#999" stroke-width="1"/>
    <ellipse cx="430" cy="378" rx="68" ry="26" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="390" y="376" fill="#dc2626" font-size="12" font-weight="bold">Anchoring</text>
    <text x="378" y="392" fill="#999" font-size="10">terpaku harga beli</text>
  </g>
  <g>
    <line x1="350" y1="258" x2="230" y2="330" stroke="#999" stroke-width="1"/>
    <ellipse cx="180" cy="345" rx="68" ry="26" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="140" y="343" fill="#dc2626" font-size="12" font-weight="bold">Recency</text>
    <text x="128" y="359" fill="#999" font-size="10">fokus kejadian baru</text>
  </g>
  <g>
    <line x1="338" y1="205" x2="160" y2="150" stroke="#999" stroke-width="1"/>
    <ellipse cx="110" cy="135" rx="80" ry="26" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="55" y="133" fill="#dc2626" font-size="12" font-weight="bold">Overconfidence</text>
    <text x="55" y="149" fill="#999" font-size="10">merasa selalu benar</text>
  </g>
</svg>
