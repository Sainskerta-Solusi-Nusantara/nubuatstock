<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="system-ui, sans-serif">
  <!-- axes -->
  <line x1="60" y1="360" x2="720" y2="360" stroke="#999" stroke-width="1.5"/>
  <line x1="60" y1="40" x2="60" y2="360" stroke="#999" stroke-width="1.5"/>
  <text x="20" y="50" fill="#999" font-size="12">Emosi</text>
  <text x="650" y="385" fill="#999" font-size="12">Waktu</text>

  <!-- emotion curve: naik ke euforia, jatuh ke panik, pulih -->
  <path d="M60 320 C140 300, 180 250, 230 200 C270 160, 300 120, 350 90 C380 72, 410 70, 440 110 C470 150, 490 250, 530 320 C560 360, 590 350, 630 300 C670 250, 700 210, 720 190"
        fill="none" stroke="#3b82f6" stroke-width="3"/>

  <!-- key points -->
  <circle cx="160" cy="270" r="5" fill="#16a34a"/>
  <text x="120" y="258" fill="#16a34a" font-size="12">Optimisme</text>

  <circle cx="280" cy="148" r="5" fill="#16a34a"/>
  <text x="240" y="138" fill="#16a34a" font-size="12">Antusias</text>

  <circle cx="350" cy="90" r="6" fill="#dc2626"/>
  <text x="305" y="78" fill="#dc2626" font-size="13" font-weight="bold">EUFORIA</text>
  <text x="300" y="115" fill="#999" font-size="11">(risiko maksimal)</text>

  <circle cx="440" cy="110" r="5" fill="#dc2626"/>
  <text x="450" y="105" fill="#dc2626" font-size="12">Penyangkalan</text>

  <circle cx="490" cy="250" r="5" fill="#dc2626"/>
  <text x="500" y="245" fill="#dc2626" font-size="12">Takut</text>

  <circle cx="530" cy="320" r="6" fill="#dc2626"/>
  <text x="490" y="345" fill="#dc2626" font-size="13" font-weight="bold">PANIK</text>

  <circle cx="630" cy="300" r="5" fill="#16a34a"/>
  <text x="585" y="290" fill="#16a34a" font-size="12">Pasrah</text>

  <circle cx="710" cy="195" r="5" fill="#16a34a"/>
  <text x="650" y="185" fill="#16a34a" font-size="12">Harapan</text>

  <!-- annotation -->
  <text x="270" y="400" fill="#999" font-size="11">Beli saat euforia = peluang rugi tertinggi; beli saat pasrah = peluang terbaik</text>
</svg>
