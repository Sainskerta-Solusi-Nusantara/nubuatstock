<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Beda continuous auction yang terus-menerus dengan full call auction yang per sesi lelang">
  <!-- continuous -->
  <text x="190" y="60" fill="#16a34a" font-size="13" font-weight="700" text-anchor="middle">Continuous (papan biasa)</text>
  <line x1="50" y1="120" x2="330" y2="120" stroke="#4b5563" stroke-width="1.5" />
  <g fill="#16a34a">
    <circle cx="70" cy="120" r="4"/><circle cx="95" cy="120" r="4"/><circle cx="120" cy="120" r="4"/><circle cx="145" cy="120" r="4"/><circle cx="170" cy="120" r="4"/><circle cx="195" cy="120" r="4"/><circle cx="220" cy="120" r="4"/><circle cx="245" cy="120" r="4"/><circle cx="270" cy="120" r="4"/><circle cx="295" cy="120" r="4"/><circle cx="320" cy="120" r="4"/>
  </g>
  <text x="190" y="150" fill="#999" font-size="10.5" text-anchor="middle">transaksi terus-menerus</text>

  <!-- divider -->
  <line x1="360" y1="40" x2="360" y2="220" stroke="#374151" stroke-width="1" />

  <!-- FCA -->
  <text x="540" y="60" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">Full Call Auction (papan khusus)</text>
  <line x1="400" y1="120" x2="690" y2="120" stroke="#4b5563" stroke-width="1.5" />
  <g fill="#f59e0b">
    <circle cx="430" cy="120" r="7"/><circle cx="520" cy="120" r="7"/><circle cx="610" cy="120" r="7"/><circle cx="680" cy="120" r="7"/>
  </g>
  <text x="430" y="148" fill="#999" font-size="9.5" text-anchor="middle">lelang 1</text>
  <text x="520" y="148" fill="#999" font-size="9.5" text-anchor="middle">lelang 2</text>
  <text x="610" y="148" fill="#999" font-size="9.5" text-anchor="middle">lelang 3</text>
  <text x="540" y="172" fill="#999" font-size="10.5" text-anchor="middle">match serentak per sesi</text>

  <text x="360" y="230" fill="#dc2626" font-size="11.5" text-anchor="middle" font-weight="700">FCA: eksekusi TIDAK instan — order antri sampai sesi lelang berikutnya.</text>
  <text x="360" y="262" fill="#999" font-size="11" text-anchor="middle">Likuiditas bisa tipis, spread lebar, susah keluar cepat. Saham gocap bisa turun di bawah Rp50.</text>
</svg>
