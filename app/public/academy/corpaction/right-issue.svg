<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" role="img" aria-label="Right issue: tiga pilihan pemegang saham — tebus, jual rights, atau diam (dilusi)">
  <text x="360" y="32" fill="#e5e7eb" font-size="14" font-weight="700" text-anchor="middle">Right Issue (HMETD) — 3 Pilihanmu</text>

  <!-- option 1: tebus -->
  <rect x="40" y="60" width="190" height="180" rx="8" fill="#16a34a" opacity="0.08" stroke="#16a34a" stroke-width="1.5" />
  <text x="135" y="90" fill="#16a34a" font-size="13" font-weight="700" text-anchor="middle">1. Tebus</text>
  <text x="135" y="125" fill="#e5e7eb" font-size="11" text-anchor="middle">bayar harga</text>
  <text x="135" y="142" fill="#e5e7eb" font-size="11" text-anchor="middle">pelaksanaan</text>
  <text x="135" y="185" fill="#16a34a" font-size="11" text-anchor="middle" font-weight="700">dapat saham baru</text>
  <text x="135" y="205" fill="#16a34a" font-size="11" text-anchor="middle">hindari dilusi &#10003;</text>

  <!-- option 2: jual rights -->
  <rect x="265" y="60" width="190" height="180" rx="8" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5" />
  <text x="360" y="90" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">2. Jual Rights</text>
  <text x="360" y="125" fill="#e5e7eb" font-size="11" text-anchor="middle">jual hak (-R)</text>
  <text x="360" y="142" fill="#e5e7eb" font-size="11" text-anchor="middle">di bursa</text>
  <text x="360" y="185" fill="#3b82f6" font-size="11" text-anchor="middle">dapat kompensasi,</text>
  <text x="360" y="205" fill="#3b82f6" font-size="11" text-anchor="middle">tetap terdilusi</text>

  <!-- option 3: diam -->
  <rect x="490" y="60" width="190" height="180" rx="8" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1.5" />
  <text x="585" y="90" fill="#dc2626" font-size="13" font-weight="700" text-anchor="middle">3. Diam</text>
  <text x="585" y="125" fill="#e5e7eb" font-size="11" text-anchor="middle">tidak berbuat</text>
  <text x="585" y="142" fill="#e5e7eb" font-size="11" text-anchor="middle">apa-apa</text>
  <text x="585" y="185" fill="#dc2626" font-size="11" text-anchor="middle" font-weight="700">hak HANGUS</text>
  <text x="585" y="205" fill="#dc2626" font-size="11" text-anchor="middle">+ kena dilusi (terburuk)</text>

  <text x="360" y="278" fill="#999" font-size="11.5" text-anchor="middle">Kalau tak mau ikut, MINIMAL jual rights-nya — jangan dibiarkan hangus.</text>
</svg>
