<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="system-ui, Arial, sans-serif">
  <text x="430" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#888">Skema Distribusi Wyckoff (Fase A–E)</text>

  <!-- area trading range -->
  <rect x="120" y="90" width="560" height="120" fill="#dc2626" opacity="0.10"/>
  <line x1="120" y1="90" x2="760" y2="90" stroke="#dc2626" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="120" y1="210" x2="760" y2="210" stroke="#dc2626" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="100" y="94" text-anchor="end" font-size="10" fill="#dc2626">Resistance</text>
  <text x="100" y="214" text-anchor="end" font-size="10" fill="#dc2626">Support</text>

  <!-- sumbu -->
  <line x1="60" y1="380" x2="800" y2="380" stroke="#888" stroke-width="1.5"/>
  <line x1="60" y1="380" x2="60" y2="60" stroke="#888" stroke-width="1.5"/>

  <!-- kurva harga -->
  <path d="M60 330 L120 140
           L150 200 L185 80 L210 205
           L250 120 L300 205 L350 120
           L400 205 L430 60 L460 130
           L500 205 L560 210 L600 230
           L660 200 L720 280 L780 350"
        fill="none" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- fase pemisah -->
  <line x1="120" y1="60" x2="120" y2="380" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="225" y1="60" x2="225" y2="380" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="375" y1="60" x2="375" y2="380" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="475" y1="60" x2="475" y2="380" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"/>
  <line x1="610" y1="60" x2="610" y2="380" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"/>

  <!-- label fase -->
  <text x="170" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">A</text>
  <text x="300" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">B</text>
  <text x="425" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">C</text>
  <text x="542" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">D</text>
  <text x="700" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">E</text>

  <!-- event -->
  <circle cx="120" cy="140" r="4" fill="#16a34a"/>
  <text x="118" y="130" text-anchor="middle" font-size="10" fill="#999">PSY</text>
  <circle cx="185" cy="80" r="4" fill="#16a34a"/>
  <text x="185" y="70" text-anchor="middle" font-size="10" fill="#999">BC</text>
  <circle cx="210" cy="205" r="4" fill="#3b82f6"/>
  <text x="210" y="223" text-anchor="middle" font-size="10" fill="#999">AR</text>
  <circle cx="350" cy="120" r="4" fill="#3b82f6"/>
  <text x="350" y="110" text-anchor="middle" font-size="10" fill="#999">ST</text>
  <circle cx="430" cy="60" r="4" fill="#dc2626"/>
  <text x="430" y="52" text-anchor="middle" font-size="10" fill="#dc2626">UTAD</text>
  <circle cx="560" cy="210" r="4" fill="#dc2626"/>
  <text x="560" y="228" text-anchor="middle" font-size="10" fill="#dc2626">SOW</text>
  <circle cx="660" cy="200" r="4" fill="#3b82f6"/>
  <text x="668" y="190" text-anchor="middle" font-size="10" fill="#999">LPSY</text>
  <text x="745" y="345" text-anchor="middle" font-size="10" fill="#dc2626">Markdown</text>
</svg>
