<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="system-ui, Arial, sans-serif">
  <!-- Siklus pasar Wyckoff: Akumulasi -> Markup -> Distribusi -> Markdown -->
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#888">Siklus Pasar Wyckoff</text>

  <!-- sumbu -->
  <line x1="60" y1="320" x2="780" y2="320" stroke="#888" stroke-width="1.5"/>
  <line x1="60" y1="320" x2="60" y2="60" stroke="#888" stroke-width="1.5"/>
  <text x="20" y="195" text-anchor="middle" font-size="12" fill="#999" transform="rotate(-90 20 195)">Harga</text>
  <text x="410" y="350" text-anchor="middle" font-size="12" fill="#999">Waktu</text>

  <!-- area fase -->
  <rect x="60" y="240" width="170" height="80" fill="#16a34a" opacity="0.12"/>
  <rect x="590" y="100" width="170" height="80" fill="#dc2626" opacity="0.12"/>

  <!-- kurva harga -->
  <path d="M60 280 C 110 290, 180 270, 230 280
           C 320 280, 420 150, 510 110
           C 540 105, 560 130, 590 120
           C 660 110, 710 175, 760 165
           C 790 215, 800 290, 800 300"
        fill="none" stroke="#3b82f6" stroke-width="3"/>

  <!-- garis fase pemisah -->
  <line x1="230" y1="60" x2="230" y2="320" stroke="#888" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="510" y1="60" x2="510" y2="320" stroke="#888" stroke-width="0.8" stroke-dasharray="4 4"/>
  <line x1="590" y1="60" x2="590" y2="320" stroke="#888" stroke-width="0.8" stroke-dasharray="4 4"/>

  <!-- label fase -->
  <text x="145" y="305" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">AKUMULASI</text>
  <text x="370" y="205" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">MARKUP</text>
  <text x="675" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">DISTRIBUSI</text>
  <text x="745" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#888">MARKDOWN</text>

  <!-- panah arah -->
  <text x="370" y="225" text-anchor="middle" font-size="11" fill="#999">tren naik</text>
  <text x="745" y="275" text-anchor="middle" font-size="11" fill="#999">tren turun</text>
</svg>
