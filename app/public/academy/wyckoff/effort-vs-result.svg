<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="system-ui, Arial, sans-serif">
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#888">Volume Spread Analysis: Effort vs Result</text>

  <!-- Panel kiri: harmoni -->
  <text x="210" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">Harmoni (sehat)</text>
  <!-- candle naik besar -->
  <line x1="170" y1="90" x2="170" y2="230" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="158" y="110" width="24" height="100" fill="#16a34a" opacity="0.5" stroke="#16a34a"/>
  <line x1="250" y1="80" x2="250" y2="240" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="238" y="95" width="24" height="130" fill="#16a34a" opacity="0.5" stroke="#16a34a"/>
  <text x="210" y="258" text-anchor="middle" font-size="10" fill="#999">spread lebar (result)</text>
  <!-- volume -->
  <rect x="158" y="300" width="24" height="50" fill="#888"/>
  <rect x="238" y="280" width="24" height="70" fill="#888"/>
  <line x1="120" y1="350" x2="320" y2="350" stroke="#888"/>
  <text x="210" y="372" text-anchor="middle" font-size="10" fill="#999">volume naik (effort)</text>
  <text x="210" y="395" text-anchor="middle" font-size="10" fill="#16a34a">effort = result → tren valid</text>

  <!-- garis pemisah -->
  <line x1="410" y1="50" x2="410" y2="400" stroke="#888" stroke-width="0.8" stroke-dasharray="4 4"/>

  <!-- Panel kanan: anomali -->
  <text x="610" y="60" text-anchor="middle" font-size="13" font-weight="bold" fill="#dc2626">Anomali (divergensi)</text>
  <!-- candle kecil dengan volume besar -->
  <line x1="570" y1="150" x2="570" y2="200" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="558" y="160" width="24" height="25" fill="#dc2626" opacity="0.5" stroke="#dc2626"/>
  <line x1="650" y1="145" x2="650" y2="205" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="638" y="165" width="24" height="22" fill="#dc2626" opacity="0.5" stroke="#dc2626"/>
  <text x="610" y="258" text-anchor="middle" font-size="10" fill="#999">spread sempit (result kecil)</text>
  <!-- volume besar -->
  <rect x="558" y="250" width="24" height="100" fill="#dc2626" opacity="0.6"/>
  <rect x="638" y="240" width="24" height="110" fill="#dc2626" opacity="0.6"/>
  <line x1="520" y1="350" x2="720" y2="350" stroke="#888"/>
  <text x="610" y="372" text-anchor="middle" font-size="10" fill="#999">volume sangat besar (effort)</text>
  <text x="610" y="395" text-anchor="middle" font-size="10" fill="#dc2626">effort besar, result kecil → ada penyerapan</text>
</svg>
