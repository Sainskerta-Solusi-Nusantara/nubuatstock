<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="sans-serif">
  <text x="260" y="24" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">Pola Engulfing</text>

  <!-- Bullish Engulfing -->
  <text x="140" y="54" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">Bullish Engulfing</text>
  <line x1="100" y1="90" x2="100" y2="98" stroke="#dc2626" stroke-width="2"/>
  <rect x="88" y="98" width="24" height="50" fill="#dc2626"/>
  <line x1="100" y1="148" x2="100" y2="156" stroke="#dc2626" stroke-width="2"/>
  <line x1="160" y1="72" x2="160" y2="80" stroke="#16a34a" stroke-width="2"/>
  <rect x="146" y="80" width="28" height="92" fill="#16a34a"/>
  <line x1="160" y1="172" x2="160" y2="180" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="206" text-anchor="middle" fill="#999" font-size="10">body hijau menelan body merah</text>
  <text x="140" y="222" text-anchor="middle" fill="#999" font-size="9">(setelah tren turun)</text>

  <!-- Bearish Engulfing -->
  <text x="380" y="54" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">Bearish Engulfing</text>
  <line x1="340" y1="100" x2="340" y2="108" stroke="#16a34a" stroke-width="2"/>
  <rect x="328" y="108" width="24" height="50" fill="#16a34a"/>
  <line x1="340" y1="158" x2="340" y2="166" stroke="#16a34a" stroke-width="2"/>
  <line x1="400" y1="78" x2="400" y2="86" stroke="#dc2626" stroke-width="2"/>
  <rect x="386" y="86" width="28" height="92" fill="#dc2626"/>
  <line x1="400" y1="178" x2="400" y2="186" stroke="#dc2626" stroke-width="2"/>
  <text x="380" y="206" text-anchor="middle" fill="#999" font-size="10">body merah menelan body hijau</text>
  <text x="380" y="222" text-anchor="middle" fill="#999" font-size="9">(setelah tren naik)</text>

  <text x="260" y="258" text-anchor="middle" fill="#999" font-size="10">Harami = kebalikannya: candle ke-2 KECIL di dalam body candle ke-1</text>
</svg>
