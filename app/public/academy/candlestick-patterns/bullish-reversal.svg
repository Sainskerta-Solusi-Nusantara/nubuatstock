<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="sans-serif">
  <text x="300" y="24" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">Pola Reversal Bullish (muncul setelah tren turun)</text>

  <!-- Hammer -->
  <text x="90" y="56" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">Hammer</text>
  <line x1="90" y1="80" x2="90" y2="90" stroke="#16a34a" stroke-width="2"/>
  <rect x="78" y="90" width="24" height="22" fill="#16a34a"/>
  <line x1="90" y1="112" x2="90" y2="170" stroke="#16a34a" stroke-width="2"/>
  <text x="90" y="190" text-anchor="middle" fill="#999" font-size="9">wick bawah panjang</text>

  <!-- Inverted Hammer -->
  <text x="230" y="56" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">Inverted Hammer</text>
  <line x1="230" y1="80" x2="230" y2="138" stroke="#16a34a" stroke-width="2"/>
  <rect x="218" y="138" width="24" height="22" fill="#16a34a"/>
  <line x1="230" y1="160" x2="230" y2="170" stroke="#16a34a" stroke-width="2"/>
  <text x="230" y="190" text-anchor="middle" fill="#999" font-size="9">wick atas panjang</text>

  <!-- Piercing Line -->
  <text x="400" y="56" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">Piercing Line</text>
  <line x1="380" y1="78" x2="380" y2="86" stroke="#dc2626" stroke-width="2"/>
  <rect x="368" y="86" width="24" height="70" fill="#dc2626"/>
  <line x1="380" y1="156" x2="380" y2="164" stroke="#dc2626" stroke-width="2"/>
  <line x1="420" y1="108" x2="420" y2="116" stroke="#16a34a" stroke-width="2"/>
  <rect x="408" y="116" width="24" height="62" fill="#16a34a"/>
  <line x1="420" y1="178" x2="420" y2="186" stroke="#16a34a" stroke-width="2"/>
  <line x1="360" y1="121" x2="440" y2="121" stroke="#999" stroke-dasharray="3 3" stroke-width="1"/>
  <text x="400" y="206" text-anchor="middle" fill="#999" font-size="9">close tembus &gt;50% body merah</text>

  <!-- Tweezer Bottom -->
  <text x="540" y="56" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">Tweezer Bottom</text>
  <line x1="522" y1="78" x2="522" y2="86" stroke="#dc2626" stroke-width="2"/>
  <rect x="510" y="86" width="24" height="74" fill="#dc2626"/>
  <line x1="556" y1="86" x2="556" y2="94" stroke="#16a34a" stroke-width="2"/>
  <rect x="544" y="94" width="24" height="66" fill="#16a34a"/>
  <line x1="500" y1="160" x2="580" y2="160" stroke="#999" stroke-dasharray="3 3" stroke-width="1"/>
  <text x="540" y="180" text-anchor="middle" fill="#999" font-size="9">dua low yang sama</text>

  <text x="300" y="270" text-anchor="middle" fill="#999" font-size="10">Wick panjang / penolakan harga rendah = sinyal pembalikan ke atas</text>
</svg>
