<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="sans-serif">
  <text x="300" y="24" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">Pola Continuation (lanjutan tren)</text>

  <!-- Rising Three Methods -->
  <text x="150" y="52" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">Rising Three Methods</text>
  <!-- big green -->
  <line x1="60" y1="86" x2="60" y2="94" stroke="#16a34a" stroke-width="2"/>
  <rect x="48" y="94" width="24" height="96" fill="#16a34a"/>
  <line x1="60" y1="190" x2="60" y2="198" stroke="#16a34a" stroke-width="2"/>
  <!-- 3 small reds -->
  <line x1="110" y1="116" x2="110" y2="124" stroke="#dc2626" stroke-width="2"/>
  <rect x="100" y="124" width="20" height="24" fill="#dc2626"/>
  <line x1="110" y1="148" x2="110" y2="156" stroke="#dc2626" stroke-width="2"/>
  <line x1="150" y1="128" x2="150" y2="136" stroke="#dc2626" stroke-width="2"/>
  <rect x="140" y="136" width="20" height="24" fill="#dc2626"/>
  <line x1="150" y1="160" x2="150" y2="168" stroke="#dc2626" stroke-width="2"/>
  <line x1="190" y1="140" x2="190" y2="148" stroke="#dc2626" stroke-width="2"/>
  <rect x="180" y="148" width="20" height="24" fill="#dc2626"/>
  <line x1="190" y1="172" x2="190" y2="180" stroke="#dc2626" stroke-width="2"/>
  <!-- big green again -->
  <line x1="240" y1="74" x2="240" y2="82" stroke="#16a34a" stroke-width="2"/>
  <rect x="228" y="82" width="24" height="100" fill="#16a34a"/>
  <line x1="240" y1="182" x2="240" y2="190" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="226" text-anchor="middle" fill="#999" font-size="9">hijau besar &#8594; 3 koreksi kecil &#8594; hijau besar baru</text>

  <!-- Falling Three Methods -->
  <text x="450" y="52" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">Falling Three Methods</text>
  <line x1="360" y1="78" x2="360" y2="86" stroke="#dc2626" stroke-width="2"/>
  <rect x="348" y="86" width="24" height="96" fill="#dc2626"/>
  <line x1="360" y1="182" x2="360" y2="190" stroke="#dc2626" stroke-width="2"/>
  <line x1="410" y1="116" x2="410" y2="124" stroke="#16a34a" stroke-width="2"/>
  <rect x="400" y="124" width="20" height="24" fill="#16a34a"/>
  <line x1="410" y1="148" x2="410" y2="156" stroke="#16a34a" stroke-width="2"/>
  <line x1="450" y1="104" x2="450" y2="112" stroke="#16a34a" stroke-width="2"/>
  <rect x="440" y="112" width="20" height="24" fill="#16a34a"/>
  <line x1="450" y1="136" x2="450" y2="144" stroke="#16a34a" stroke-width="2"/>
  <line x1="490" y1="92" x2="490" y2="100" stroke="#16a34a" stroke-width="2"/>
  <rect x="480" y="100" width="20" height="24" fill="#16a34a"/>
  <line x1="490" y1="124" x2="490" y2="132" stroke="#16a34a" stroke-width="2"/>
  <line x1="540" y1="100" x2="540" y2="108" stroke="#dc2626" stroke-width="2"/>
  <rect x="528" y="108" width="24" height="100" fill="#dc2626"/>
  <line x1="540" y1="208" x2="540" y2="216" stroke="#dc2626" stroke-width="2"/>
  <text x="450" y="226" text-anchor="middle" fill="#999" font-size="9">merah besar &#8594; 3 rebound kecil &#8594; merah besar baru</text>

  <!-- Gap -->
  <text x="300" y="254" text-anchor="middle" fill="#999" font-size="11" font-weight="bold">Gap Up / Gap Down</text>
  <text x="300" y="274" text-anchor="middle" fill="#999" font-size="10">celah harga antar candle = momentum kuat searah tren (gap up bullish, gap down bearish)</text>
</svg>
