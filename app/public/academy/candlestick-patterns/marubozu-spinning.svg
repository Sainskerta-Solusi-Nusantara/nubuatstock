<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="sans-serif">
  <text x="280" y="24" text-anchor="middle" fill="#999" font-size="13" font-weight="bold">Marubozu &amp; Spinning Top</text>

  <!-- Bullish Marubozu -->
  <text x="90" y="52" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="bold">Marubozu Hijau</text>
  <rect x="74" y="72" width="32" height="120" fill="#16a34a"/>
  <text x="90" y="214" text-anchor="middle" fill="#999" font-size="9">tanpa wick, full body</text>
  <text x="90" y="228" text-anchor="middle" fill="#999" font-size="9">tekanan beli kuat</text>

  <!-- Bearish Marubozu -->
  <text x="230" y="52" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">Marubozu Merah</text>
  <rect x="214" y="72" width="32" height="120" fill="#dc2626"/>
  <text x="230" y="214" text-anchor="middle" fill="#999" font-size="9">tanpa wick, full body</text>
  <text x="230" y="228" text-anchor="middle" fill="#999" font-size="9">tekanan jual kuat</text>

  <!-- Spinning Top -->
  <text x="400" y="52" text-anchor="middle" fill="#999" font-size="11" font-weight="bold">Spinning Top</text>
  <line x1="400" y1="78" x2="400" y2="118" stroke="#999" stroke-width="2"/>
  <rect x="384" y="118" width="32" height="28" fill="#999"/>
  <line x1="400" y1="146" x2="400" y2="186" stroke="#999" stroke-width="2"/>
  <text x="400" y="214" text-anchor="middle" fill="#999" font-size="9">body kecil, wick atas-bawah</text>
  <text x="400" y="228" text-anchor="middle" fill="#999" font-size="9">keraguan / momentum lemah</text>

  <!-- Mini bullish/bearish spinning variations -->
  <text x="510" y="52" text-anchor="middle" fill="#999" font-size="11" font-weight="bold">Variasi warna</text>
  <line x1="498" y1="86" x2="498" y2="116" stroke="#16a34a" stroke-width="2"/>
  <rect x="486" y="116" width="24" height="22" fill="#16a34a"/>
  <line x1="498" y1="138" x2="498" y2="168" stroke="#16a34a" stroke-width="2"/>
  <line x1="528" y1="86" x2="528" y2="116" stroke="#dc2626" stroke-width="2"/>
  <rect x="516" y="116" width="24" height="22" fill="#dc2626"/>
  <line x1="528" y1="138" x2="528" y2="168" stroke="#dc2626" stroke-width="2"/>
  <text x="510" y="214" text-anchor="middle" fill="#999" font-size="9">bisa hijau atau merah</text>
</svg>
