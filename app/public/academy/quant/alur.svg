<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220" font-family="sans-serif">
  <rect x="0" y="0" width="860" height="220" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <g>
    <rect x="20" y="80" width="140" height="60" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="90" y="106" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Ide /</text>
    <text x="90" y="124" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Hipotesis</text>
  </g>

  <g>
    <rect x="200" y="80" width="140" height="60" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="270" y="106" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Rule Entry/Exit</text>
    <text x="270" y="124" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Eksplisit</text>
  </g>

  <g>
    <rect x="380" y="80" width="140" height="60" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="450" y="115" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Screening Faktor</text>
  </g>

  <g>
    <rect x="560" y="80" width="140" height="60" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
    <text x="630" y="106" text-anchor="middle" fill="#1f2937" font-size="13" font-weight="600">Backtest</text>
    <text x="630" y="124" text-anchor="middle" fill="#1f2937" font-size="12">(out-of-sample)</text>
  </g>

  <g>
    <rect x="740" y="80" width="100" height="60" rx="12" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="2"/>
    <text x="790" y="105" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Eksekusi +</text>
    <text x="790" y="121" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Manaj. Risiko</text>
  </g>

  <!-- Arrows -->
  <line x1="162" y1="110" x2="198" y2="110" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="342" y1="110" x2="378" y2="110" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="522" y1="110" x2="558" y2="110" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="702" y1="110" x2="738" y2="110" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
